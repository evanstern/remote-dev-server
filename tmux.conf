# --- General ---

set -g default-terminal "tmux-256color"
set -g history-limit 50000
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g focus-events on
set -g set-clipboard on
setw -g aggressive-resize on

# Faster key repetition
set -sg escape-time 0
set -g repeat-time 1000

# --- Status Bar ---

set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left "[#S] "
set -g status-left-length 30
set -g status-right "#(tmux list-sessions | wc -l | tr -d ' ') sessions | %H:%M"
set -g status-right-length 40

# Active window
setw -g window-status-current-style "fg=green,bold"
setw -g window-status-current-format "#{?#{==:#{window_name},_terminals},, #I:#W }"

# Inactive windows
setw -g window-status-style "fg=colour245"
setw -g window-status-format "#{?#{==:#{window_name},_terminals},, #I:#W }"

# --- Copy Mode ---

# Use vi keys in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix+[, then:
#   v       — begin selection
#   V       — select whole line
#   C-v     — toggle block/rectangle selection
#   y       — yank selection and exit
#   /       — search forward
#   ?       — search backward
#   q       — quit copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Paste with prefix+p (in addition to default prefix+])
bind p paste-buffer

# --- Keybindings ---

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes (keep current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (Shift-vim or arrow keys, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Unbind default arrow pane-select so arrows can resize instead
unbind Up
unbind Down
unbind Left
unbind Right
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# New window (keep current directory)
bind c new-window -c "#{pane_current_path}"

# fzf session switcher: prefix + f
bind f display-popup -E -w 60% -h 40% \
    "tmux list-sessions -F '#{session_name}' | fzf --preview 'tmux capture-pane -t {} -p' | xargs -r tmux switch-client -t"

# fzf pane picker: prefix + ` — switch between zoomed panes in this window
bind ` run-shell 'tmux display-popup -E -w 60% -h 40% "tmux-pane-picker \"#{session_name}\" \"#{window_index}\" \"#{pane_id}\" \"#{pane_current_path}\""'

# --- Plugins ---

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Session persistence
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Clipboard: forward copies to the host clipboard over SSH via OSC 52.
# Works with Ghostty (and any terminal that supports OSC 52).
# The terminal-overrides line teaches tmux the Ms capability so it actually
# emits the OSC 52 escape sequence rather than silently dropping it.
set -g set-clipboard on
set -ag terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'
set -g @yank_with_mouse on
# Tip: hold Shift while dragging to bypass tmux entirely and use the
# terminal's native selection (also lands in the system clipboard).

# Initialize TPM (keep this at the bottom)
run '~/.tmux/plugins/tpm/tpm'
